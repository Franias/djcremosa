name: Deploy to GitHub Pages

# Builds on push to main and on manual trigger, then publishes ./out to GitHub
# Pages. The repo must have Settings → Pages → Source = "GitHub Actions"
# (one-time, by the owner).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Restrict the default token to read-only; allow only the writes Pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't run concurrent deploys — prevent older runs from overwriting newer.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Sync audio (from backup)
        # Audio source files (.gitignored) are restored from a private
        # backup before each deploy. Override AUDIO_SRC via repo
        # Settings → Secrets → Variables if the path changes.
        # On a CI runner with no backup mounted, this step skips itself.
        run: |
          if [[ -n "${AUDIO_SRC:-}" && -d "${AUDIO_SRC}" ]]; then
            echo "::notice::Syncing audio from ${AUDIO_SRC}"
            npm run sync:audio
          else
            echo "::warning::AUDIO_SRC not set or unreachable; deploying without audio. /musica visualizer will run in idle CSS mode."
          fi

      - name: Build (next build → ./out)
        run: npm run build
        env:
          # next.config.ts reads NEXT_PUBLIC_BASE_PATH to set the
          # asset prefix for production (matches GitHub Pages path).
          # Leave unset for custom-domain deploys.
          # Repo moved to Franias/djcremosa.exe on 2026-07-16, so
          # the GitHub Pages URL is now https://francias.github.io/djcremosa.exe/
          # and the basePath tracks the new repo slug.
          NEXT_PUBLIC_BASE_PATH: /djcremosa.exe
          # Set the public site URL so Next.js generates absolute OG/Twitter
          # Set the public site URL so Next.js generates absolute OG/Twitter
          # meta URLs correctly. Override in repo Settings → Secrets if you
          # ever move off Pages (e.g. djcremosa.com.br → https://djcremosa.com.br).
          NEXT_PUBLIC_SITE_URL: https://djcremosa.com.br

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
